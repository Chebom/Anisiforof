const s=document.getElementById('v');
Object.keys(data).forEach(x=>s.add(new Option(x,x)));

function render(){
let h='';
data[s.value].forEach((q,i)=>{
const multi=String(q.answer).length>1;
h+=`<div class=q><h3>${i+1}. ${q.question}</h3>`;
q.options.forEach((o,j)=>{
h+=`<label><input type="${multi?'checkbox':'radio'}" name="q${i}" value="${j+1}"> ${o}</label><br>`;
});
h+=`<button onclick="check(${i})">Проверить</button><div id="f${i}"></div></div>`;
});
quiz.innerHTML=h;
}

function check(i){
const q=data[s.value][i];
const chosen=[...document.querySelectorAll(`[name=q${i}]:checked`)].map(e=>e.value).sort().join('');
const right=String(q.answer).replace(/[^0-9]/g,'').split('').sort().join('');
const fb=document.getElementById('f'+i);

if(!chosen){fb.innerHTML='<span class=bad>Выберите ответ</span>';return;}

fb.innerHTML=(chosen===right)
? `<span class=ok>✓ Правильно. Ответ: ${q.answer}</span>`
: `<span class=bad>✗ Неправильно. Правильный ответ: ${q.answer}</span>`;
}

function finish(){
let c=0;
data[s.value].forEach((q,i)=>{
const chosen=[...document.querySelectorAll(`[name=q${i}]:checked`)].map(e=>e.value).sort().join('');
const right=String(q.answer).replace(/[^0-9]/g,'').split('').sort().join('');
if(chosen===right)c++;
});
let g=2;if(c>=15)g=3;if(c>=20)g=4;if(c>=25)g=5;
res.innerHTML=`<h2>Правильных: ${c}</h2><h2>Оценка: ${g}</h2>`;
}
s.onchange=render;s.value=Object.keys(data)[0];render();
